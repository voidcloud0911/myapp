<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <div class="card">

      <div class="header">
        <h1>Welcome</h1>
        <p>Create an account or login</p>
      </div>

      <!-- REGISTER -->
      <input id="regUser" placeholder="Username">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Create Account</button>

      <div class="divider">or</div>

      <!-- LOGIN -->
      <input id="logUser" placeholder="Username">
      <input id="logPass" type="password" placeholder="Password">
      <button class="secondary" onclick="login()">Login</button>

      <p id="response" class="message"></p>

    </div>
  </div>

  <script>
    async function register() {
      const res = await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: document.getElementById("regUser").value,
          password: document.getElementById("regPass").value
        })
      });

      const data = await res.json(); // ✅ FIXED
      const message = document.getElementById("response");

      message.innerText = data.message;
      message.className = "message " + (data.success ? "success" : "error");
    }

    async function login() {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: document.getElementById("logUser").value,
          password: document.getElementById("logPass").value
        })
      });

      const data = await res.json(); // ✅ FIXED
      const message = document.getElementById("response");

      message.innerText = data.message;
      message.className = "message " + (data.success ? "success" : "error");

      // ✅ Save token
      if (data.token) {
        localStorage.setItem("token", data.token);
          window.location.href = "/public/dashboard.html";
        // optional redirect
        // window.location.href = "/dashboard.html";
      }
    }
  </script>

</body>
</html>
