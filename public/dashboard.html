<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style2.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">🚀 MyApp</h2>

    <nav>
      <a href="#" class="active" onclick="showSection('dashboard', this)">Dashboard</a>
      <a href="#" onclick="showSection('profile', this)">Profile</a>
      <a href="#" onclick="showSection('settings', this)">Settings</a>
    </nav>

    <button onclick="logout()" class="logout-btn">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="top">
      <h1>Dashboard</h1>

      <div class="user-info">
        <div class="avatar">👤</div>
        <div>
          <h3 id="usernameDisplay">Loading...</h3>
          <p id="welcome">Welcome back</p>
        </div>
      </div>
    </header>

    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection">
      <section class="cards">
        <div class="card">
          <h3>👤 Username</h3>
          <p id="username">...</p>
        </div>

        <div class="card">
          <h3>🔐 Status</h3>
          <p>Authenticated</p>
        </div>

        <div class="card">
          <h3>⏳ Session</h3>
          <p>Active</p>
        </div>
      </section>

      <section class="charts">
        <div class="chart-box">
          <h3>📈 Activity</h3>
          <canvas id="lineChart"></canvas>
        </div>

        <div class="chart-box">
          <h3>📊 Stats</h3>
          <canvas id="barChart"></canvas>
        </div>
      </section>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profileSection" style="display:none;">
      <section class="profile">
        <h2>Profile</h2>
        <input id="newPassword" type="password" placeholder="New Password">
        <button onclick="changePassword()">Change Password</button>
        <p id="msg"></p>
      </section>
    </div>

    <!-- SETTINGS SECTION -->
    <div id="settingsSection" style="display:none;">
      <section class="profile">
        <h2>Settings</h2>
        <p>Coming soon...</p>
      </section>
    </div>

  </main>

</div>

<script>
const token = localStorage.getItem("token");
const API = "https://myapp-smoky-seven.vercel.app";

if (!token) window.location.href = "/";

// LOAD USER
async function loadUser() {
  const res = await fetch(API + "/api/me", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  if (!data.success) return;

  username.innerText = data.user.username;
  usernameDisplay.innerText = data.user.username;
  welcome.innerText = "Welcome, " + data.user.username;
}
loadUser();

// CHANGE PASSWORD
async function changePassword() {
  const res = await fetch(API + "/api/change-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ newPassword: newPassword.value })
  });

  const data = await res.json();
  msg.innerText = data.message;
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/";
}

// NAVIGATION
function showSection(section, element) {
  document.getElementById("dashboardSection").style.display = "none";
  document.getElementById("profileSection").style.display = "none";
  document.getElementById("settingsSection").style.display = "none";

  document.getElementById(section + "Section").style.display = "block";

  document.querySelectorAll(".sidebar nav a").forEach(link => {
    link.classList.remove("active");
  });

  element.classList.add("active");
}

// CHARTS
new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [{
      data: [3,7,5,9,6,4,8],
      borderColor: "#6366f1",
      backgroundColor: "rgba(99,102,241,0.2)",
      fill: true
    }]
  }
});

new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["Logins","Actions","Updates"],
    datasets: [{
      data: [12,19,7],
      backgroundColor: ["#6366f1","#22c55e","#f59e0b"]
    }]
  },
  options: { plugins: { legend: { display:false } } }
});
</script>

</body>
</html>
