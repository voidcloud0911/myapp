<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style2.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">🚀 MyApp</h2>

    <nav>
      <a href="#" class="active">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Settings</a>
    </nav>

    <button onclick="logout()" class="logout-btn">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="top">
      <h1>Dashboard</h1>

      <div class="user-info">
        <div class="avatar">👤</div>
        <div>
          <h3 id="usernameDisplay">Loading...</h3>
          <p id="welcome">Welcome back</p>
        </div>
      </div>
    </header>

    <!-- CARDS -->
    <section class="cards">
      <div class="card">
        <h3>👤 Username</h3>
        <p id="username">...</p>
      </div>

      <div class="card">
        <h3>🔐 Status</h3>
        <p>Authenticated</p>
      </div>

      <div class="card">
        <h3>⏳ Session</h3>
        <p>Active</p>
      </div>
    </section>

    <!-- CHARTS -->
    <section class="charts">

      <div class="chart-box">
        <h3>📈 Activity Overview</h3>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="chart-box">
        <h3>📊 Usage Stats</h3>
        <canvas id="barChart"></canvas>
      </div>

    </section>

    <!-- PROFILE -->
    <section class="profile">
      <h2>Profile</h2>

      <input id="newPassword" type="password" placeholder="New Password">
      <button onclick="changePassword()">Change Password</button>

      <p id="msg"></p>
    </section>

  </main>

</div>

<script>
const token = localStorage.getItem("token");

// ✅ API
const API = "https://myapp-smoky-seven.vercel.app";

if (!token) {
  window.location.href = "/";
}

// ================= USER =================
async function loadUser() {
  const res = await fetch(API + "/api/me", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const data = await res.json();
  console.log(data);

  if (!data.success) return;

  username.innerText = data.user.username;
  usernameDisplay.innerText = data.user.username;
  welcome.innerText = "Welcome, " + data.user.username;
}

loadUser();

// ================= PASSWORD =================
async function changePassword() {
  const res = await fetch(API + "/api/change-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      newPassword: newPassword.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/";
}

// ================= CHARTS =================

// Line Chart
new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
    datasets: [{
      label: "Activity",
      data: [3, 7, 5, 9, 6, 4, 8],
      borderColor: "#6366f1",
      backgroundColor: "rgba(99,102,241,0.2)",
      fill: true,
      tension: 0.4
    }]
  }
});

// Bar Chart
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["Logins", "Actions", "Updates"],
    datasets: [{
      data: [12, 19, 7],
      backgroundColor: ["#6366f1", "#22c55e", "#f59e0b"]
    }]
  },
  options: {
    plugins: {
      legend: { display: false }
    }
  }
});
</script>

</body>
</html>
