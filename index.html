<!DOCTYPE html>
<html>
<head>
  <title>Auth System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <div class="card">

    <!-- LOGO / TITLE -->
    <div class="header">
      <h1>MyApp</h1>
      <p>Welcome back 👋</p>
    </div>

    <!-- REGISTER -->
    <div id="registerBox">
      <input id="regUser" placeholder="Username">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Create Account</button>
      <div class="switch" onclick="showLogin()">Already have an account?</div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="hidden">
      <input id="logUser" placeholder="Username">
      <input id="logPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <div class="switch" onclick="showRegister()">Create account</div>
    </div>

    <div id="message" class="message"></div>

  </div>

</div>

<script>
function showLogin() {
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function showRegister() {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function register() {
  fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  })
  .then(res => res.text())
  .then(data => {
    message.innerText = data;
    message.style.color = data.includes("❌") ? "#ef4444" : "#10b981";
  });
}

function login() {
  fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  })
  .then(res => res.text())
  .then(data => {
    message.innerText = data;
    message.style.color = data.includes("❌") ? "#ef4444" : "#10b981";
  });
}
</script>

</body>
</html>
